<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/global.css">
  <!-- Example: set these meta tags with your project values or use window.__SUPABASE_CONFIG__ -->
  <meta name="supabase-url" content="https://YOUR_SUPABASE_URL">
  <meta name="supabase-anon-key" content="YOUR_SUPABASE_ANON_KEY">
</head>
<body>
  <main>
    <h1>Login</h1>
    <form id="loginForm">
      <label>Email <input type="email" name="email" required></label>
      <label>Password <input type="password" name="password" required></label>
      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="/auth/signup.html">Sign up</a></p>
  </main>
  <script type="module">
    import { supabase, initSupabase } from '../js/supabaseClient.js'

    // If you prefer runtime config, set window.__SUPABASE_CONFIG__ = { url: '...', anonKey: '...' }
    if (window.__SUPABASE_CONFIG__) {
      initSupabase(window.__SUPABASE_CONFIG__)
    }

    const form = document.getElementById('loginForm')
    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const formData = new FormData(form)
      const email = formData.get('email')
      const password = formData.get('password')

      const { error, data } = await supabase.auth.signInWithPassword({ email, password })
      if (error) {
        alert(error.message)
        return
      }

      // fetch profile and redirect based on role
      const { data: profile, error: pErr } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single()

      const role = profile?.role ?? 'buyer'
      if (role === 'admin') {
        window.location.href = '/dashboard/admin/index.html'
      } else {
        window.location.href = '/dashboard/buyer/index.html'
      }
    })
  </script>
</body>
</html>
