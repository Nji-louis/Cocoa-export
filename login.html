  <title>CAMCOCOA | Account Access</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/global.min.css">
  <style>
    body { background: #f5f3ef; }
    .auth-wrapper { max-width: 960px; margin: 60px auto; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 30px; }
    .auth-header { text-align: center; margin-bottom: 24px; }
    .auth-status { margin-top: 12px; padding: 10px 12px; border-radius: 6px; display: none; font-weight: 600; }
    .auth-status.success { background: #e8f5e9; color: #2e7d32; }
    .auth-status.error { background: #ffebee; color: #b71c1c; }
  </style>
</head>
<body data-auth-entry="login">
  <div class="auth-wrapper">
    <div class="auth-header">
      <h2>CAMCOCOA Account</h2>
      <p>Sign in to your dashboard or create a buyer account.</p>
    </div>
    <div id="auth-setup-notice" class="auth-status error" style="margin-bottom:18px;"></div>
    <div class="row" id="auth-main-row">
      <div class="col-md-6">
        <h4>Login</h4>
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" class="form-control" id="login-email" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" class="form-control" id="login-password" autocomplete="current-password" required>
          </div>
          <p><button type="button" class="btn btn-link" id="login-forgot">Forgot Password?</button></p>
          <p><button type="button" class="btn btn-link" id="login-resend">Resend Confirmation Email</button></p>
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
          <div id="login-status" class="auth-status"></div>
        </form>
      </div>
      <div class="col-md-6">
        <h4>Buyer Signup</h4>
        <form id="signup-form" novalidate>
          <div class="form-group">
            <label for="signup-full-name">Full Name</label>
            <input type="text" class="form-control" id="signup-full-name" required>
          </div>
          <div class="form-group">
            <label for="signup-company">Company Name</label>
            <input type="text" class="form-control" id="signup-company" required>
          </div>
          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" class="form-control" id="signup-email" required>
          </div>
          <div class="form-group">
            <label for="signup-phone">Phone / WhatsApp</label>
            <input type="text" class="form-control" id="signup-phone" required>
          </div>
          <div class="form-group">
            <label for="signup-country">Country</label>
            <input type="text" class="form-control" id="signup-country" required>
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" class="form-control" id="signup-password" minlength="8" required>
          </div>
          <div class="form-group">
            <label for="signup-confirm-password">Confirm Password</label>
            <input type="password" class="form-control" id="signup-confirm-password" minlength="8" required>
          </div>
          <button type="submit" class="btn btn-success btn-block">Create Buyer Account</button>
          <div id="signup-status" class="auth-status"></div>
          <p style="margin-top:10px; color:#555;">After signup we will email a verification link. You must verify before logging in. If the message does not arrive after resend, the Supabase Auth email sender needs dashboard setup.</p>
        </form>
      </div>
    </div>
    <div class="row" id="recovery-row" style="display:none;">
      <div class="col-md-8 col-md-offset-2">
        <h4>Set a New Password</h4>
        <form id="recovery-form" novalidate>
          <input type="text" class="sr-only" id="recovery-username" autocomplete="username" tabindex="-1" aria-hidden="true">
          <div class="form-group">
            <label for="recovery-password">New Password</label>
            <input type="password" class="form-control" id="recovery-password" autocomplete="new-password" minlength="8" required>
          </div>
          <div class="form-group">
            <label for="recovery-confirm-password">Confirm Password</label>
            <input type="password" class="form-control" id="recovery-confirm-password" autocomplete="new-password" minlength="8" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Update Password</button>
          <button type="button" class="btn btn-link btn-block" id="recovery-back" style="margin-top:8px;">Back to sign in</button>
          <div id="recovery-status" class="auth-status"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase/config.min.js"></script>
  <script src="js/supabase/client.min.js"></script>
  <script src="js/supabase/auth.min.js"></script>
  <script src="js/auth-flow.js"></script>
</body>
</html>
