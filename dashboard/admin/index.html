<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/global.css">
  <!-- Supabase runtime config (replace in templates or set window.__SUPABASE_CONFIG__) -->
  <meta name="supabase-url" content="https://YOUR_SUPABASE_URL">
  <meta name="supabase-anon-key" content="YOUR_SUPABASE_ANON_KEY">
</head>
<body>
  <header>
    <h1>Admin Dashboard</h1>
    <a href="/auth/login.html" id="logout">Logout</a>
  </header>
  <main>
    <section>
      <h2>All Inquiries</h2>
      <table id="inquiriesTable">
        <thead><tr><th>User</th><th>Product</th><th>Qty</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section>
      <h2>Users</h2>
      <table id="usersTable">
        <thead><tr><th>Email</th><th>Company</th><th>Role</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script type="module">
    import { requireAuth } from '../../js/authGuard.js'
    import { supabase, initSupabase } from '../../js/supabaseClient.js'

    // initialize from runtime config if provided
    if (window.__SUPABASE_CONFIG__) initSupabase(window.__SUPABASE_CONFIG__)

    const res = await requireAuth(['admin'])
    if (!res) throw new Error('not authorized')

    document.getElementById('logout').addEventListener('click', async (e) => {
      e.preventDefault()
      await supabase.auth.signOut()
      window.location.href = '/auth/login.html'
    })

    async function loadInquiries() {
      const { data } = await supabase.from('inquiries').select('*, profiles(email)').order('created_at', { ascending: false })
      const tbody = document.querySelector('#inquiriesTable tbody')
      tbody.innerHTML = ''
      data.forEach(r => {
        const tr = document.createElement('tr')
        const userEmail = r.profiles?.email ?? r.user_id
        tr.innerHTML = `<td>${userEmail}</td><td>${r.product}</td><td>${r.quantity}</td><td>${r.status}</td><td>${new Date(r.created_at).toLocaleString()}</td><td><select data-id="${r.id}" class="statusSelect"><option value="pending">pending</option><option value="approved">approved</option><option value="shipped">shipped</option></select></td>`
        tbody.appendChild(tr)
      })

      document.querySelectorAll('.statusSelect').forEach(sel => {
        sel.addEventListener('change', async (e) => {
          const id = e.target.dataset.id
          const status = e.target.value
          await supabase.from('inquiries').update({ status }).eq('id', id)
          alert('Updated')
        })
      })
    }

    async function loadUsers() {
      const { data } = await supabase.from('profiles').select('*')
      const tbody = document.querySelector('#usersTable tbody')
      tbody.innerHTML = ''
      data.forEach(u => {
        const tr = document.createElement('tr')
        tr.innerHTML = `<td>${u.email}</td><td>${u.company_name ?? ''}</td><td>${u.role}</td>`
        tbody.appendChild(tr)
      })
    }

    await loadInquiries()
    await loadUsers()
  </script>
</body>
</html>
