<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Buyer Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/global.css">
  <!-- Supabase runtime config (replace in templates or set window.__SUPABASE_CONFIG__) -->
  <meta name="supabase-url" content="https://YOUR_SUPABASE_URL">
  <meta name="supabase-anon-key" content="YOUR_SUPABASE_ANON_KEY">
</head>
<body>
  <header>
    <h1>Buyer Dashboard</h1>
    <a href="/auth/login.html" id="logout">Logout</a>
  </header>

  <main>
    <section id="summary">
      <h2>Summary</h2>
      <div id="counts">Loading...</div>
    </section>

    <section id="myRequests">
      <h2>My Requests</h2>
      <table id="requestsTable">
        <thead><tr><th>Product</th><th>Qty</th><th>Status</th><th>Date</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script type="module">
    import { requireAuth } from '../../js/authGuard.js'
    import { supabase, initSupabase } from '../../js/supabaseClient.js'

    // initialize from runtime config if provided
    if (window.__SUPABASE_CONFIG__) initSupabase(window.__SUPABASE_CONFIG__)

    const res = await requireAuth(['buyer','admin'])
    if (!res) throw new Error('not authorized')
    const { user } = res

    document.getElementById('logout').addEventListener('click', async (e) => {
      e.preventDefault()
      await supabase.auth.signOut()
      window.location.href = '/auth/login.html'
    })

    async function loadRequests() {
      const { data } = await supabase
        .from('inquiries')
        .select('*')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false })

      const tbody = document.querySelector('#requestsTable tbody')
      tbody.innerHTML = ''
      data.forEach(r => {
        const tr = document.createElement('tr')
        tr.innerHTML = `<td>${r.product}</td><td>${r.quantity}</td><td>${r.status}</td><td>${new Date(r.created_at).toLocaleString()}</td>`
        tbody.appendChild(tr)
      })

      document.getElementById('counts').innerText = `${data.length} requests`
    }

    loadRequests()
  </script>
</body>
</html>
