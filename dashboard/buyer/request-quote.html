<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Request Quote</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/global.css">
</head>
<body>
  <main>
    <h1>Request Quote</h1>
    <form id="dashboard-quote-form">
      <label>Name <input name="name" required></label>
      <label>Company <input name="company_name"></label>
      <label>Email <input name="workEmail" type="email"></label>
      <label>Product Type <input name="product"></label>
      <label>Quantity (MT) <input name="quantity"></label>
      <label>Message <textarea name="message"></textarea></label>
      <button type="submit">Send Request</button>
    </form>
  </main>
  <script type="module">
    import { requireAuth } from '../../js/authGuard.js'
    import { submitInquiry } from '/js/forms.js'
    import { initSupabase } from '/js/supabaseClient.js'

    if (window.__SUPABASE_CONFIG__) initSupabase(window.__SUPABASE_CONFIG__)

    const res = await requireAuth(['buyer','admin'])
    if (!res) throw new Error('not authorized')

    const form = document.getElementById('dashboard-quote-form')
    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      try {
        await submitInquiry(form)
        alert('Request submitted')
        form.reset()
      } catch (err) {
        alert(err.message || 'Failed')
      }
    })
  </script>
</body>
</html>
